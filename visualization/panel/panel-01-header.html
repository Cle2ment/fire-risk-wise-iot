<style>
:root {
    --bg-deep: #060b16;
    --bg-panel: #0c1a2e;
    --bg-card: #112240;
    --border: #1a3456;
    --accent: #00d4ff;
    --accent-dim: #007899;
    --text-primary: #e0ecff;
    --text-secondary: #5a7da0;
    --green: #00e676;
    --orange: #ffab40;
    --red: #ff3d4f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

.header-panel {
    width: 100%;
    height: 100%;
    min-height: 80px;
    background: linear-gradient(180deg, #0a1628 0%, #0c1a2e 60%, #0e1f36 100%);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 2px;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: "Microsoft YaHei", "Source Han Sans CN", "Noto Sans SC", sans-serif;
    position: relative;
    overflow: hidden;
}

/* 顶部扫描线 */
.header-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
        transparent 0%, rgba(0,212,255,0.6) 20%, rgba(0,212,255,0.8) 50%,
        rgba(0,212,255,0.6) 80%, transparent 100%);
    animation: scanLine 3s ease-in-out infinite;
}
@keyframes scanLine {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
}

/* 左下角装饰 */
.header-panel::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 120px; height: 1px;
    background: var(--accent);
    opacity: 0.3;
}

/* 左侧区块 */
.header-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    z-index: 1;
}

/* 主标题 */
.header-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text-primary);
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    line-height: 1.3;
}

/* 主标题高亮 */
.header-title .accent {
    color: var(--accent);
}

/* 副标题行 */
.header-subtitle {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 1px;
}

.subtitle-divider {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    border-radius: 1px;
}

/* 右侧时间 */
.header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    position: relative;
    z-index: 1;
}

.datetime-display {
    display: flex;
    align-items: baseline;
    gap: 16px;
}

.header-date {
    font-size: 14px;
    color: var(--text-secondary);
    letter-spacing: 2px;
    font-weight: 300;
}

.header-time {
    font-size: 38px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    font-family: "Orbitron", "Consolas", "Courier New", monospace;
    text-shadow: 0 0 16px rgba(0, 212, 255, 0.4);
    line-height: 1;
}

.header-seconds {
    font-size: 16px;
    color: rgba(0, 212, 255, 0.5);
    font-family: "Orbitron", "Consolas", monospace;
    letter-spacing: 2px;
}

/* 右侧状态指示 */
.status-row {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 1px;
}

.status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
}

/* 顶部网格式装饰 */
.grid-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
        linear-gradient(rgba(0, 212, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.02) 1px, transparent 1px);
    background-size: 60px 30px;
    pointer-events: none;
    z-index: 0;
}
</style>

<div class="header-panel">
    <div class="grid-overlay"></div>

    <div class="header-left">
        <div class="header-title">
            消防风险<span class="accent">智能视觉</span>识别看板
        </div>
        <div class="header-subtitle">
            <span class="subtitle-divider"></span>
            2026 Advantech AIoT Innovation Competition
        </div>
    </div>

    <div class="header-right">
        <div class="datetime-display">
            <span class="header-date" id="headerDate">--</span>
            <span class="header-time" id="headerTime">--:--</span>
            <span class="header-seconds" id="headerSec">--</span>
        </div>
        <div class="status-row">
            <span class="status-dot"></span>
            系统运行中 · SYSTEM ONLINE
        </div>
    </div>
</div>

<script>
(function updateClock() {
    const now = new Date();
    const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const w = weekDays[now.getDay()];
    document.getElementById('headerDate').textContent = `${y}/${m}/${d} 周${w}`;
    document.getElementById('headerTime').textContent =
        `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    document.getElementById('headerSec').textContent =
        String(now.getSeconds()).padStart(2, '0');
    requestAnimationFrame(() => setTimeout(updateClock, 1000));
})();
</script>
