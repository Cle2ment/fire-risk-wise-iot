<style>
:root {
    --bg-deep:#060b16;--bg-panel:#0c1a2e;--bg-card:#112240;
    --border:#1a3456;--accent:#00d4ff;--text-primary:#e0ecff;
    --text-secondary:#5a7da0;--green:#00e676;--orange:#ffab40;--red:#ff3d4f;
}
*{margin:0;padding:0;box-sizing:border-box}

.weekly-panel {
    width:100%;height:100%;min-height:270px;
    background:linear-gradient(180deg,#0c1a2e 0%,#0e1f38 100%);
    border:1px solid rgba(0,212,255,0.15);border-radius:2px;
    padding:14px 18px 10px;font-family:"Microsoft YaHei","Source Han Sans CN","Noto Sans SC",sans-serif;
    position:relative;overflow:hidden;display:flex;flex-direction:column;gap:8px;
}
.weekly-panel::before {
    content:'';position:absolute;inset:0;
    background-image:linear-gradient(rgba(0,212,255,0.015) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,212,255,0.015) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;
}

.weekly-header {
    display:flex;align-items:center;gap:10px;padding-bottom:6px;
    border-bottom:1px solid rgba(0,212,255,0.12);z-index:1;
}
.weekly-header-dot {width:6px;height:6px;background:var(--accent);box-shadow:0 0 6px var(--accent);}
.weekly-header-text {font-size:13px;color:var(--accent);letter-spacing:2px;font-weight:500;flex:1;}
.weekly-avg {font-size:11px;color:var(--text-secondary);letter-spacing:1px;}
.weekly-avg b {color:var(--orange);}

.chart-wrap {flex:1;display:flex;align-items:flex-end;gap:16px;padding:0 20px;z-index:1;}

.bar-col {
    flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;
}
.bar-fill-wrap {
    flex:1; width:100%; position:relative;
}
.bar-fill {
    position:absolute; bottom:0; left:15%; right:15%;
    border-radius:3px 3px 0 0; transition:height 1s ease;
    min-height:4px;
}
.bar-fill::after {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:rgba(255,255,255,0.3); border-radius:1px;
}

.bar-value {font-size:14px;font-weight:700;letter-spacing:1px;color:var(--text-primary);}
.bar-label {font-size:10px;color:var(--text-secondary);letter-spacing:1px;}

/* 图例 */
.weekly-legend {
    display:flex;gap:16px;justify-content:center;z-index:1;padding-top:4px;
    border-top:1px solid rgba(0,212,255,0.06);
}
.legend-item {display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-secondary);}
.legend-dot {width:7px;height:7px;border-radius:1px;}
</style>

<div class="weekly-panel">
    <div class="weekly-header">
        <span class="weekly-header-dot"></span>
        <span class="weekly-header-text">近 7 日风险指数趋势 · WEEKLY TREND</span>
        <span class="weekly-avg">周均 <b>41</b></span>
    </div>
    <div class="chart-wrap" id="weeklyChart"></div>
    <div class="weekly-legend">
        <div class="legend-item"><span class="legend-dot" style="background:var(--green);"></span>低 0-30</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--orange);"></span>中 30-70</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--red);"></span>高 70-100</div>
    </div>
</div>

<script>
(function(){
    const days = ['周一','周二','周三','周四','周五','周六','周日'];
    const values = [38, 52, 71, 45, 33, 28, 21];

    function getColor(v) {
        if (v >= 70) return 'var(--red)';
        if (v >= 30) return 'var(--orange)';
        return 'var(--green)';
    }

    let html = '';
    for (let i = 0; i < days.length; i++) {
        html += `
        <div class="bar-col">
            <div class="bar-value">${values[i]}</div>
            <div class="bar-fill-wrap">
                <div class="bar-fill" data-h="${values[i]}" style="background:${getColor(values[i])}"></div>
            </div>
            <div class="bar-label">${days[i]}</div>
        </div>`;
    }
    document.getElementById('weeklyChart').innerHTML = html;

    function resizeBars() {
        document.querySelectorAll('.bar-fill').forEach(b => {
            const wrapH = b.parentElement.offsetHeight;
            const pct = parseFloat(b.dataset.h) / 100;
            b.style.height = Math.max(3, wrapH * pct) + 'px';
        });
    }
    setTimeout(resizeBars, 100);
    window.addEventListener('resize', resizeBars);
})();
</script>
