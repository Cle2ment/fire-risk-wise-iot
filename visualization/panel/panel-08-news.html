<style>
:root {
    --bg-deep: #060b16;
    --bg-panel: #0c1a2e;
    --bg-card: #112240;
    --border: #1a3456;
    --accent: #00d4ff;
    --text-primary: #e0ecff;
    --text-secondary: #5a7da0;
    --green: #00e676;
    --orange: #ffab40;
    --red: #ff3d4f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

.news-panel {
    width: 100%; height: 100%;
    min-height: 320px;
    background: linear-gradient(180deg, #0c1a2e 0%, #0e1f38 100%);
    border: 1px solid rgba(0, 212, 255, 0.15);
    border-radius: 2px;
    padding: 14px 18px;
    display: flex;
    gap: 16px;
    font-family: "Microsoft YaHei", "Source Han Sans CN", "Noto Sans SC", sans-serif;
    position: relative;
    overflow: hidden;
}

.news-panel::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(0, 212, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
}

/* ========== 左侧图片 ========== */
.news-image {
    flex: 0 0 42%;
    position: relative;
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 2px;
    overflow: hidden;
    background: var(--bg-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
}

.news-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    opacity: 0.85;
}

.news-image-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
}

.news-image-placeholder .ph-icon {
    font-size: 32px;
    opacity: 0.4;
}

.news-image-placeholder .ph-text {
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.5;
}

/* 四角标 */
.news-image .corner {
    position: absolute; width: 14px; height: 14px; pointer-events: none; z-index: 2;
}
.news-image .corner-tl { top: 6px; left: 6px;   border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
.news-image .corner-tr { top: 6px; right: 6px;  border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
.news-image .corner-bl { bottom: 6px; left: 6px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
.news-image .corner-br { bottom: 6px; right: 6px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

/* 图片底部标签 */
.news-image .camera-label {
    position: absolute;
    bottom: 8px; left: 8px;
    background: rgba(0, 20, 40, 0.85);
    border: 1px solid rgba(0, 212, 255, 0.25);
    padding: 4px 10px;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    border-radius: 1px;
    z-index: 2;
}

/* ========== 右侧新闻 ========== */
.news-feed {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1;
    min-width: 0;
}

.news-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(0, 212, 255, 0.12);
}

.news-header-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

.news-header-text {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight: 500;
    flex: 1;
}

.news-header-time {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    font-family: "Consolas", monospace;
}

/* 滚动容器 */
.news-scroll {
    flex: 1;
    overflow: hidden;
    position: relative;
    mask-image: linear-gradient(to bottom,
        transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom,
        transparent 0%, black 8%, black 92%, transparent 100%);
}

.news-track {
    animation: scrollNews 30s linear infinite;
}

.news-track:hover {
    animation-play-state: paused;
}

@keyframes scrollNews {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-50%); }
}

/* 新闻条目 */
.news-item {
    padding: 10px 0;
    border-bottom: 1px dashed rgba(0, 212, 255, 0.12);
    border-left: 3px solid transparent;
    padding-left: 10px;
}

.news-item-title {
    font-size: 14px;
    font-weight: bold;
    color: var(--text-primary);
    letter-spacing: 0.5px;
    line-height: 1.5;
    margin-bottom: 4px;
}

.news-item-desc {
    font-size: 12px;
    color: #8ab4d6;
    line-height: 1.6;
    margin-bottom: 3px;
}

.news-item-time {
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    font-family: "Consolas", monospace;
}

/* 高优先级条目 — 防御外部 .alert 样式干扰 */
.news-item.alert {
    display: block;
    background: none;
    border-left-color: rgba(255, 171, 64, 0.5);
}
.news-item.alert .news-item-title {
    color: var(--orange);
}
</style>

<div class="news-panel">
    <!-- 左侧图片 -->
    <div class="news-image">
        <img src="" alt=""
             onerror="this.style.display='none';this.previousElementSibling.style.display='flex';">
        <div class="news-image-placeholder" style="display:flex;">
            <span class="ph-icon">📷</span>
            <span class="ph-text">现场实时画面</span>
        </div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="camera-label">LIVE · 消防监控</div>
    </div>

    <!-- 右侧新闻 -->
    <div class="news-feed">
        <div class="news-header">
            <span class="news-header-dot"></span>
            <span class="news-header-text">消防时讯 · FIRE NEWS</span>
            <span class="news-header-time" id="newsClock">--:--:--</span>
        </div>

        <div class="news-scroll">
            <div class="news-track" id="newsTrack">
                <!-- 由JS动态生成以实现无缝循环 -->
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // 新闻数据
    const newsData = [
        { time: '2026-07-18 14:32', title: '住建部印发老旧小区消防通道专项整治方案', desc: '住房和城乡建设部正式印发《老旧小区消防通道专项整治三年行动方案》，要求全面清理占用、堵塞消防通道的违规行为，打通生命通道"最后一公里"。', source: '住建部', alert: true },
        { time: '2026-07-18 13:15', title: '夏季高温预警：全国多地发布森林火险橙色预警', desc: '应急管理部联合气象局发布2026年度夏季森林火险橙色预警，覆盖华南、西南及华北部分地区，提醒各地加强森林防火巡查。', source: '应急管理部', alert: true },
        { time: '2026-07-18 11:48', title: '智能烟感报警器国家标准修订征求意见稿发布', desc: '市场监管总局就新版《独立式光电感烟火灾探测报警器》国家标准公开征求意见，新标准引入NB-IoT通信能力和自检上报功能。', source: '市场监管总局', alert: false },
        { time: '2026-07-18 10:20', title: '某小区电动车违规充电引发火灾，幸无人员伤亡', desc: '今日凌晨4时许，城南某小区地下车库因电动自行车违规充电引发火情，物业及时启动喷淋系统控制火势，消防救援站接警后迅速到场处置。', source: '消防通报', alert: true },
        { time: '2026-07-17 09:05', title: '城市消防物联网建设指南（2026版）正式实施', desc: '工业和信息化部发布的新版城市消防物联网建设指南于7月1日起正式实施，明确了智能烟感、电气火灾监控、消防水系统监测等关键设备的接入标准。', source: '工信部', alert: false },
        { time: '2026-07-17 08:00', title: 'AI视觉识别技术在消防隐患排查中的应用前景', desc: '中国消防救援学院发布最新研究报告，基于深度学习的视频火灾检测方案在工业园区的误报率已降至0.3%以下，识别响应时间缩短至5秒以内。', source: '科技日报', alert: false },
        { time: '2026-07-16 07:30', title: '社区微型消防站建设三年行动方案推进过半', desc: '消防救援局通报，截至6月底全国已建成社区微型消防站4.2万个，覆盖率达68%，力争年底前实现80%目标。', source: '消防救援局', alert: false },
    ];

    // 生成HTML（复制一份实现无缝循环）
    const track = document.getElementById('newsTrack');
    const makeItem = item => `
        <div class="news-item${item.alert ? ' alert' : ''}">
            <div class="news-item-title">${item.title}</div>
            <div class="news-item-desc">${item.desc}</div>
            <div class="news-item-time">${item.time}</div>
        </div>
    `;
    track.innerHTML = newsData.map(makeItem).join('') + newsData.map(makeItem).join('');

    // 时钟
    function updateClock() {
        const now = new Date();
        document.getElementById('newsClock').textContent =
            `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
})();
</script>
