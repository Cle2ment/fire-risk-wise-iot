# YOLO26 检测模型训练超参数
# 用于 smart_community_detect 项目

# --- 基础参数 ---
model: yolo26n.pt          # 预训练权重
data: datasets/dataset.yaml # 数据集配置
epochs: 100                # 训练轮数
patience: 20               # 早停轮数
batch: 16                  # 批次大小
imgsz: 640                 # 输入分辨率
device: 0                  # GPU 设备（0=第一块GPU, cpu=CPU）

# --- 优化器 ---
optimizer: auto            # YOLO26 默认 MuSGD
lr0: 0.01                  # 初始学习率
lrf: 0.01                  # 最终学习率因子 (lr0 * lrf)
momentum: 0.937            # SGD 动量
weight_decay: 0.0005       # 权重衰减

# --- 数据增强 ---
hsv_h: 0.015               # HSV-Hue 增强
hsv_s: 0.7                 # HSV-Saturation 增强
hsv_v: 0.4                 # HSV-Value 增强
degrees: 0.0               # 旋转角度
translate: 0.1             # 平移
scale: 0.5                 # 缩放
shear: 0.0                 # 剪切
perspective: 0.0           # 透视变换
flipud: 0.0                # 上下翻转概率
fliplr: 0.5                # 左右翻转概率
mosaic: 1.0                # Mosaic 增强
mixup: 0.0                 # MixUp 增强
copy_paste: 0.1            # Copy-Paste 增强（小目标专用）

# --- 损失函数 ---
box: 7.5                   # BBox 损失权重
cls: 0.5                   # 分类损失权重
dfl: 1.5                   # DFL 损失权重（YOLO26 已移除此模块，忽略）

# --- 其他 ---
workers: 8                 # 数据加载线程数
project: runs/detect       # 输出目录
name: smart_community_detect # 实验名称
exist_ok: false            # 是否覆盖已存在目录
pretrained: true           # 使用预训练权重
resume: false              # 从中断处恢复训练
