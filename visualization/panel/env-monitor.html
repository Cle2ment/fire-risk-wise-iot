<style>
    /* ========== 整体面板：四格一行 ========== */
    .env-monitor-panel {
        width: calc(100% + 24px);
        margin-left: -12px;
        margin-top: -8px;
        margin-bottom: -8px;
        padding: 15px;
        box-sizing: border-box;
        background: linear-gradient(135deg, #031228 0%, #0a2e5c 100%);
        border: 1px solid rgba(0, 212, 255, 0.35);
        border-radius: 6px;
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
        font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr;
        gap: 15px;
        min-height: 260px;
    }

    /* ========== 通用卡片样式 ========== */
    .monitor-card {
        background: rgba(0, 20, 45, 0.6);
        border: 1px solid rgba(0, 180, 255, 0.25);
        border-radius: 6px;
        padding: 12px 15px;
        box-shadow: inset 0 0 10px rgba(0, 100, 180, 0.1);
        display: flex;
        flex-direction: column;
        position: relative;
    }

    /* 卡片标题 */
    .card-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 18px;
        color: #7ddfff;
        font-weight: 500;
        margin-bottom: 6px;
    }

    .card-title .icon {
        font-size: 20px;
    }

    /* 大数值 */
    .card-main-value {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 44px;
        font-weight: bold;
        color: #ffffff;
    }

    /* ========== 平均值/峰值：优化后的迷你趋势图 ========== */
    .mini-trend {
        height: 44px;
        width: 100%;
        margin-top: 6px;
        border-radius: 4px;
        overflow: hidden;
    }

    /* ========== 温度卡片 ========== */
    .thermometer-card {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 10px 12px;
    }

    /* 左侧刻度 */
    .temp-scale {
        color: #7ec8e3;
        font-size: 12px;
        line-height: 2.2;
        text-align: right;
        flex-shrink: 0;
        width: 38px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 160px;
    }

    .temp-scale div {
        position: relative;
        padding-right: 8px;
    }

    .temp-scale div::after {
        content: '';
        position: absolute;
        right: 0;
        top: 50%;
        width: 6px;
        height: 1px;
        background: rgba(126, 200, 227, 0.4);
    }

    /* 温度计主体 */
    .thermometer-wrap {
        position: relative;
        width: 30px;
        height: 160px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 玻璃管 */
    .temp-tube {
        width: 30px;
        height: 110px;
        border: 3px solid #3a7ab5;
        border-bottom: none;
        border-radius: 15px 15px 0 0;
        background: rgba(0, 20, 50, 0.85);
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
    }

    /* 液柱 */
    .temp-liquid {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background: linear-gradient(to top,
                #ff4444 0%,
                #ff7722 35%,
                #ffbb33 65%,
                #ffdd55 100%);
        border-radius: 11px 11px 0 0;
        transition: height 1s ease;
        box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.25);
    }

    /* 底部球体 */
    .temp-bulb {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid #3a7ab5;
        background: #ff4444;
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        box-shadow:
            0 0 16px rgba(255, 68, 68, 0.55),
            inset 0 -2px 8px rgba(0, 0, 0, 0.25);
        box-sizing: border-box;
    }

    /* 右侧温度数值 */
    .temp-number {
        font-size: 38px;
        font-weight: bold;
        color: #ffcc44;
        flex-shrink: 0;
        text-shadow: 0 0 12px rgba(255, 200, 60, 0.4);
        width: 50px;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 160px;
    }

    /* ========== 湿度卡片 ========== */
    .humidity-card {
        align-items: center;
        justify-content: center;
    }

    .humidity-ring {
        width: 125px;
        height: 125px;
        border-radius: 50%;
        border: 7px solid #1a6fb0;
        position: relative;
        background: linear-gradient(180deg, #e8f4ff 0%, #a0cce8 100%);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 8px;
        box-shadow:
            0 0 12px rgba(26, 111, 176, 0.3),
            inset 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    /* 波浪 */
    .humidity-wave {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 200%;
        height: 36.56%;
        background: linear-gradient(180deg,
                rgba(0, 170, 255, 0.6),
                rgba(0, 100, 200, 0.8),
                #0055bb);
        border-radius: 0;
        animation: waveMove 3.5s infinite linear;
    }

    .humidity-wave::before {
        content: '';
        position: absolute;
        top: -6px;
        left: 0;
        width: 100%;
        height: 12px;
        background: rgba(255, 255, 255, 0.35);
        border-radius: 50%;
        animation: waveRipple 3.5s infinite ease-in-out;
    }

    @keyframes waveMove {
        0% {
            transform: translateX(0);
        }

        100% {
            transform: translateX(-50%);
        }
    }

    @keyframes waveRipple {

        0%,
        100% {
            opacity: 0.4;
            transform: scaleY(1);
        }

        50% {
            opacity: 0.7;
            transform: scaleY(1.8);
        }
    }

    .humidity-number {
        position: relative;
        z-index: 2;
        font-size: 30px;
        font-weight: bold;
        color: #003366;
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.4);
    }
</style>

<div class="env-monitor-panel">

    <!-- 3. 温度 -->
    <div class="monitor-card thermometer-card">

    <!-- 4. 湿度 -->
    <div class="monitor-card humidity-card">

</div>
