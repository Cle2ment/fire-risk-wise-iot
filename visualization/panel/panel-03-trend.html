<style>
:root {
    --bg-deep: #060b16;
    --bg-panel: #0c1a2e;
    --bg-card: #112240;
    --border: #1a3456;
    --accent: #00d4ff;
    --text-primary: #e0ecff;
    --text-secondary: #5a7da0;
    --green: #00e676;
    --orange: #ffab40;
    --red: #ff3d4f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

.trend-panel {
    width: 100%; height: 100%;
    min-height: 340px;
    background: linear-gradient(180deg, #0c1a2e 0%, #0e1f38 100%);
    border: 1px solid rgba(0, 212, 255, 0.15);
    border-radius: 2px;
    padding: 14px 18px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-family: "Microsoft YaHei", "Source Han Sans CN", "Noto Sans SC", sans-serif;
    position: relative;
    overflow: hidden;
}

.trend-panel::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(0, 212, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
}

.panel-title {
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight: 500;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(0, 212, 255, 0.12);
    z-index: 1;
}

.chart-container {
    flex: 1;
    position: relative;
    z-index: 1;
}

.chart-svg {
    width: 100%;
    height: 100%;
}

/* 图表区域定义 */
.chart-area {
    fill: none;
}

/* 三色区域填充 */
.zone-low    { fill: rgba(0, 230, 118, 0.06); }
.zone-medium { fill: rgba(255, 171, 64, 0.06); }
.zone-high   { fill: rgba(255, 61, 79, 0.06); }

/* 区域分隔线 */
.zone-divider {
    stroke: rgba(0, 212, 255, 0.08);
    stroke-width: 1;
    stroke-dasharray: 4 6;
}

/* 网格线 */
.grid-line {
    stroke: rgba(0, 212, 255, 0.04);
    stroke-width: 1;
}

/* 轴线 */
.axis-line {
    stroke: rgba(0, 212, 255, 0.18);
    stroke-width: 1;
}

/* 标签 */
.axis-label {
    fill: var(--text-secondary);
    font-size: 10px;
    font-family: inherit;
    letter-spacing: 0.5px;
}

/* 风险区域标签 */
.zone-label {
    fill: var(--text-secondary);
    font-size: 9px;
    font-family: inherit;
    letter-spacing: 1px;
    opacity: 0.6;
}

/* 曲线填充 */
.curve-fill {
    opacity: 0.2;
}

/* 曲线描边 */
.curve-stroke {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* Y轴标签 */
.y-label {
    fill: var(--text-secondary);
    font-size: 10px;
}

/* 图例 */
.trend-legend {
    display: flex;
    gap: 18px;
    justify-content: center;
    z-index: 1;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
}
.legend-dot {
    width: 8px; height: 8px;
    border-radius: 1px;
}
</style>

<div class="trend-panel">
    <div class="panel-title">📈 24H 风险指数变化曲线</div>

    <div class="chart-container">
        <svg class="chart-svg" viewBox="0 0 720 260" preserveAspectRatio="xMidYMid meet" id="trendSvg">
            <defs>
                <!-- 曲线下方的三色渐变填充 -->
                <linearGradient id="curveGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stop-color="#ff3d4f" stop-opacity="0.35"/>
                    <stop offset="30%"  stop-color="#ff3d4f" stop-opacity="0.35"/>
                    <stop offset="30%"  stop-color="#ffab40" stop-opacity="0.3"/>
                    <stop offset="70%"  stop-color="#ffab40" stop-opacity="0.3"/>
                    <stop offset="70%"  stop-color="#00e676" stop-opacity="0.2"/>
                    <stop offset="100%" stop-color="#00e676" stop-opacity="0.1"/>
                </linearGradient>

                <!-- 曲线描边渐变 -->
                <linearGradient id="strokeGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stop-color="#ff3d4f"/>
                    <stop offset="30%"  stop-color="#ff3d4f"/>
                    <stop offset="30%"  stop-color="#ffab40"/>
                    <stop offset="70%"  stop-color="#ffab40"/>
                    <stop offset="70%"  stop-color="#00e676"/>
                    <stop offset="100%" stop-color="#00e676"/>
                </linearGradient>

                <!-- 发光滤镜 -->
                <filter id="glow">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- 图表背景 (左上:40,30 到 右下:685,220) -->
            <!-- 高风险区域 70-100 (Y: 30 to 75) -->
            <rect x="40" y="30" width="645" height="45" class="zone-high" rx="0"/>
            <!-- 中风险区域 30-70 (Y: 75 to 165) -->
            <rect x="40" y="75" width="645" height="90" class="zone-medium" rx="0"/>
            <!-- 低风险区域 0-30 (Y: 165 to 220) -->
            <rect x="40" y="165" width="645" height="55" class="zone-low" rx="0"/>

            <!-- 区域分隔线 -->
            <line x1="40" y1="75"  x2="685" y2="75"  class="zone-divider"/>
            <line x1="40" y1="165" x2="685" y2="165" class="zone-divider"/>

            <!-- 区域标签 -->
            <text x="680" y="50"  text-anchor="end" class="zone-label" fill="#ff3d4f" opacity="0.55">高风险 70-100</text>
            <text x="680" y="120" text-anchor="end" class="zone-label" fill="#ffab40" opacity="0.55">中风险 30-70</text>
            <text x="680" y="200" text-anchor="end" class="zone-label" fill="#00e676" opacity="0.55">低风险 0-30</text>

            <!-- Y轴网格线 -->
            <line x1="40" y1="30"  x2="685" y2="30"  class="grid-line"/>  <!-- 100 -->
            <line x1="40" y1="75"  x2="685" y2="75"  class="grid-line"/>  <!-- 70 -->
            <line x1="40" y1="120" x2="685" y2="120" class="grid-line"/>  <!-- 50 -->
            <line x1="40" y1="165" x2="685" y2="165" class="grid-line"/>  <!-- 30 -->
            <line x1="40" y1="220" x2="685" y2="220" class="grid-line"/>  <!-- 0 -->

            <!-- Y轴标签 -->
            <text x="34" y="34"  text-anchor="end" class="y-label">100</text>
            <text x="34" y="79"  text-anchor="end" class="y-label">70</text>
            <text x="34" y="124" text-anchor="end" class="y-label">50</text>
            <text x="34" y="169" text-anchor="end" class="y-label">30</text>
            <text x="34" y="224" text-anchor="end" class="y-label">0</text>

            <!-- X轴 -->
            <line x1="40" y1="220" x2="685" y2="220" class="axis-line"/>

            <!-- X轴标签 (每3小时) -->
            <text x="40"  y="236" text-anchor="middle" class="axis-label">00:00</text>
            <text x="120" y="236" text-anchor="middle" class="axis-label">03:00</text>
            <text x="201" y="236" text-anchor="middle" class="axis-label">06:00</text>
            <text x="282" y="236" text-anchor="middle" class="axis-label">09:00</text>
            <text x="363" y="236" text-anchor="middle" class="axis-label">12:00</text>
            <text x="443" y="236" text-anchor="middle" class="axis-label">15:00</text>
            <text x="524" y="236" text-anchor="middle" class="axis-label">18:00</text>
            <text x="605" y="236" text-anchor="middle" class="axis-label">21:00</text>
            <text x="685" y="236" text-anchor="middle" class="axis-label">24:00</text>

            <!-- 曲线填充和描边 (由JS动态生成) -->
            <path id="curveFill" class="curve-fill" fill="url(#curveGrad)" filter="url(#glow)"/>
            <path id="curveStroke" class="curve-stroke" stroke="url(#strokeGrad)" filter="url(#glow)"/>
        </svg>
    </div>

    <div class="trend-legend">
        <div class="legend-item"><span class="legend-dot" style="background:var(--green);"></span>低风险 0-30</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--orange);"></span>中风险 30-70</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--red);"></span>高风险 70-100</div>
    </div>
</div>

<script>
(function generateCurve() {
    const HOURS = 24;
    const CHART_LEFT = 40;
    const CHART_RIGHT = 685;
    const CHART_TOP = 30;     // Y对应值100
    const CHART_BOTTOM = 220;  // Y对应值0
    const CHART_HEIGHT = CHART_BOTTOM - CHART_TOP;

    const stepX = (CHART_RIGHT - CHART_LEFT) / HOURS;

    // 生成平滑随机曲线数据
    function generateData(n) {
        const points = [];
        let val = 35 + Math.random() * 20; // 初始值
        for (let i = 0; i <= n; i++) {
            points.push(val);
            // 随机游走，带均值回归
            const drift = (45 - val) * 0.15 + (Math.random() - 0.45) * 22;
            val = Math.max(3, Math.min(98, val + drift));
        }
        return points;
    }

    const data = generateData(HOURS);

    // 值 → Y坐标
    function valToY(v) {
        return CHART_BOTTOM - (v / 100) * CHART_HEIGHT;
    }

    // 构建路径
    let fillPath = '';
    let strokePath = '';

    for (let i = 0; i <= HOURS; i++) {
        const x = CHART_LEFT + i * stepX;
        const y = valToY(data[i]);
        if (i === 0) {
            fillPath  += `M${x},${CHART_BOTTOM} L${x},${y}`;
            strokePath += `M${x},${y}`;
        } else {
            // 使用二次贝塞尔平滑
            const prevX = CHART_LEFT + (i - 1) * stepX;
            const prevY = valToY(data[i - 1]);
            const cx = (prevX + x) / 2;
            fillPath  += ` Q${cx},${prevY} ${(prevX + x)/2},${(prevY + y)/2} Q${cx},${y} ${x},${y}`;
            strokePath += ` Q${cx},${prevY} ${(prevX + x)/2},${(prevY + y)/2} Q${cx},${y} ${x},${y}`;
        }
    }
    // 闭合填充路径
    fillPath += ` L${CHART_LEFT + HOURS * stepX},${CHART_BOTTOM} L${CHART_LEFT},${CHART_BOTTOM} Z`;

    // 延迟应用动画
    const fillEl  = document.getElementById('curveFill');
    const strokeEl = document.getElementById('curveStroke');

    // 先用clip动画展现
    fillEl.setAttribute('d', fillPath);
    strokeEl.setAttribute('d', strokePath);

    // 从右向左揭开的裁剪动画
    const svg = document.getElementById('trendSvg');
    const clipId = 'revealClip';
    const clipPath = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
    clipPath.setAttribute('id', clipId);

    const clipRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    clipRect.setAttribute('x', CHART_LEFT);
    clipRect.setAttribute('y', CHART_TOP);
    clipRect.setAttribute('width', CHART_RIGHT - CHART_LEFT);
    clipRect.setAttribute('height', CHART_BOTTOM - CHART_TOP);
    clipRect.setAttribute('fill', 'none');

    clipPath.appendChild(clipRect);
    svg.querySelector('defs').appendChild(clipPath);

    fillEl.setAttribute('clip-path', `url(#${clipId})`);
    strokeEl.setAttribute('clip-path', `url(#${clipId})`);

    // 从左到右展开动画
    let w = 0;
    const totalW = CHART_RIGHT - CHART_LEFT;
    const duration = 1500;
    const startTime = performance.now();

    function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(1, elapsed / duration);
        // ease-out
        const eased = 1 - Math.pow(1 - progress, 3);
        w = totalW * eased;
        clipRect.setAttribute('width', w);
        if (progress < 1) {
            requestAnimationFrame(animate);
        }
    }
    requestAnimationFrame(animate);
})();
</script>
