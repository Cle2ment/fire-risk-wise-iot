<style>
    :root {
        --bg-deep: #060b16;
        --bg-panel: #0c1a2e;
        --bg-card: #112240;
        --border: #1a3456;
        --accent: #00d4ff;
        --text-primary: #e0ecff;
        --text-secondary: #5a7da0;
        --green: #00e676;
        --orange: #ffab40;
        --red: #ff3d4f;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .image-panel {
        width: 100%;
        height: 100%;
        min-height: 280px;
        background: linear-gradient(180deg, #0c1a2e 0%, #0e1f38 100%);
        border: 1px solid rgba(0, 212, 255, 0.15);
        border-radius: 2px;
        padding: 14px 18px;
        font-family: "Microsoft YaHei", "Source Han Sans CN", "Noto Sans SC", sans-serif;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* 网格背景 */
    .image-panel::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(0, 212, 255, 0.015) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 212, 255, 0.015) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
    }

    /* 标题行 */
    .image-title-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid rgba(0, 212, 255, 0.12);
        z-index: 1;
    }

    .image-title-dot {
        width: 6px;
        height: 6px;
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.4;
        }
    }

    .image-title-text {
        font-size: 13px;
        color: var(--accent);
        letter-spacing: 2px;
        font-weight: 500;
    }

    /* 图片容器 */
    .image-wrap {
        flex: 1;
        position: relative;
        border: 1px solid rgba(0, 212, 255, 0.2);
        border-radius: 2px;
        overflow: hidden;
        background: var(--bg-deep);
        z-index: 1;
    }

    .image-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.85;
    }


    /* 四角标 */
    .image-wrap .corner {
        position: absolute;
        width: 14px;
        height: 14px;
        pointer-events: none;
        z-index: 2;
    }

    .image-wrap .corner-tl {
        top: 6px;
        left: 6px;
        border-top: 2px solid var(--accent);
        border-left: 2px solid var(--accent);
    }

    .image-wrap .corner-tr {
        top: 6px;
        right: 6px;
        border-top: 2px solid var(--accent);
        border-right: 2px solid var(--accent);
    }

    .image-wrap .corner-bl {
        bottom: 6px;
        left: 6px;
        border-bottom: 2px solid var(--accent);
        border-left: 2px solid var(--accent);
    }

    .image-wrap .corner-br {
        bottom: 6px;
        right: 6px;
        border-bottom: 2px solid var(--accent);
        border-right: 2px solid var(--accent);
    }

    /* 底部标签 */
    .image-wrap .camera-label {
        position: absolute;
        bottom: 8px;
        left: 8px;
        background: rgba(0, 20, 40, 0.85);
        border: 1px solid rgba(0, 212, 255, 0.25);
        padding: 4px 10px;
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 1px;
        border-radius: 1px;
        z-index: 2;
    }

    /* NO SIGNAL 状态 */
    .image-wrap .no-signal {
        display: none;
        position: absolute;
        inset: 0;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        font-size: 14px;
        letter-spacing: 2px;
    }
</style>

<div class="image-panel">
    <div class="image-title-row">
        <span class="image-title-dot"></span>
        <span class="image-title-text">高风险区域 · 实时监测画面</span>
    </div>

    <div class="image-wrap">
        <img src="../resource/image/开阔场所1.jpg" alt="监测画面"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="no-signal">NO SIGNAL</div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="camera-label">CAM-01 · 开阔场所</div>
    </div>
</div>
