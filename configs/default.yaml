# Fire Risk Detection Probe — Inference Pipeline Configuration

inference:
  model_path: "models/yolo26n.pt"       # Default: COCO pretrained, override for fine-tuned
  device: "cuda:0"                       # or "cpu"
  imgsz: 640
  conf_threshold: 0.4
  iou_threshold: 0.45

roi:
  enabled: true
  zones:
    corridor_main:
      polygon: [[100, 200], [700, 200], [750, 500], [50, 500]]
      label: "主楼道"
    fire_lane_entrance:
      polygon: [[50, 300], [200, 300], [200, 600], [50, 600]]
      label: "消防通道入口"

risk:
  score_history_window: 30              # Frames to smooth risk score
  alert_cooldown_sec: 5.0               # Cooldown before same-type re-alert
  min_detection_area_ratio: 0.001       # Ignore detections smaller than 0.1% of frame

output:
  video_fps: null                        # null = keep source FPS
  show_dashboard: true
  show_detections: true
  show_status_bar: true
  report_format: "json"                  # "json" or "csv"
