<style>
    :root {
        --bg-deep: #060b16;
        --bg-panel: #0c1a2e;
        --bg-card: #112240;
        --border: #1a3456;
        --accent: #00d4ff;
        --text-primary: #e0ecff;
        --text-secondary: #5a7da0;
        --green: #00e676;
        --orange: #ffab40;
        --red: #ff3d4f;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .monitor-panel {
        width: 100%;
        height: 100%;
        min-height: 300px;
        background: linear-gradient(180deg, #0c1a2e 0%, #0e1f38 100%);
        border: 1px solid rgba(0, 212, 255, 0.15);
        border-radius: 2px;
        padding: 14px 18px;
        display: flex;
        gap: 16px;
        font-family: "Microsoft YaHei", "Source Han Sans CN", "Noto Sans SC", sans-serif;
        position: relative;
        overflow: hidden;
    }

    /* 网格背景 */
    .monitor-panel::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(0, 212, 255, 0.015) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 212, 255, 0.015) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
    }

    /* ========== 2×2 窗格（全宽） ========== */
    .grid-2x2 {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 12px;
    }

    .sub-card {
        background: var(--bg-card);
        border: 1px solid rgba(0, 212, 255, 0.1);
        border-radius: 2px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        overflow: hidden;
        transition: border-color 0.3s, box-shadow 0.3s;
    }

    .sub-card:hover {
        border-color: rgba(0, 212, 255, 0.3);
        box-shadow: 0 0 16px rgba(0, 212, 255, 0.06);
    }

    .sub-label {
        font-size: 11px;
        color: var(--text-secondary);
        letter-spacing: 1px;
        margin-bottom: 4px;
    }

    /* 风险指数数值 */
    .risk-value {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 2px;
        line-height: 1;
    }

    .risk-value.avg {
        color: var(--accent);
    }

    .risk-value.peak {
        color: var(--orange);
    }

    .risk-unit {
        font-size: 13px;
        font-weight: 400;
        opacity: 0.6;
    }

    /* 迷你趋势线 */
    .mini-spark {
        height: 28px;
        width: 100%;
        margin-top: 6px;
        opacity: 0.7;
    }

    /* ========== 温度计 (10°C ~ 50°C) ========== */
    .thermo-card {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .thermo-scale {
        color: var(--text-secondary);
        font-size: 10px;
        line-height: 1.9;
        text-align: right;
        flex-shrink: 0;
        width: 28px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 110px;
    }

    .thermo-body {
        position: relative;
        width: 26px;
        height: 110px;
        flex-shrink: 0;
    }

    .thermo-tube {
        width: 26px;
        height: 76px;
        border: 2px solid #2a5a8a;
        border-bottom: none;
        border-radius: 13px 13px 0 0;
        background: rgba(0, 15, 35, 0.9);
        position: relative;
        overflow: hidden;
    }

    .thermo-liquid {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background: linear-gradient(to top, #ff6b35, #ffab40, #ffd740);
        border-radius: 9px 9px 0 0;
        transition: height 1.2s ease;
        box-shadow: inset 0 2px 3px rgba(255, 255, 255, 0.2);
    }

    .thermo-bulb {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 2px solid #2a5a8a;
        background: #ff6b35;
        position: absolute;
        bottom: -2px;
        left: 50%;
        transform: translateX(-50%);
        box-shadow: 0 0 12px rgba(255, 107, 53, 0.5);
    }

    .thermo-value {
        font-size: 16px;
        font-weight: 700;
        color: var(--orange);
        text-shadow: 0 0 8px rgba(255, 171, 64, 0.3);
        flex-shrink: 0;
    }

    /* ========== 湿度表 ========== */
    .humidity-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
    }

    .humi-ring-wrap {
        width: 72px;
        height: 72px;
        position: relative;
    }

    .humi-svg {
        transform: rotate(-90deg);
    }

    .humi-bg {
        fill: none;
        stroke: rgba(0, 212, 255, 0.1);
        stroke-width: 5;
    }

    .humi-fill {
        fill: none;
        stroke: var(--accent);
        stroke-width: 5;
        stroke-linecap: round;
        transition: stroke-dashoffset 1.2s ease;
    }

    .humi-center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .humi-num {
        font-size: 18px;
        font-weight: 700;
        color: var(--accent);
        text-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        line-height: 1;
    }

    .humi-pct {
        font-size: 10px;
        color: var(--text-secondary);
    }
</style>

<div class="monitor-panel">
    <!-- 2×2 窗格 -->
    <!-- 右侧 2×2 -->
    <div class="grid-2x2">
        <!-- 24H 平均风险指数 -->
        <div class="sub-card">
            <div class="sub-label">24H 平均风险指数</div>
            <div class="risk-value avg">42<span class="risk-unit">/100</span></div>
            <div class="mini-spark">
                <svg width="100%" height="100%" viewBox="0 0 160 28" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="spAvg" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3" />
                            <stop offset="100%" stop-color="#00d4ff" stop-opacity="0" />
                        </linearGradient>
                    </defs>
                    <path d="M0,24 L0,16 Q20,10 40,14 T80,12 T120,15 T160,18 L160,24 Z" fill="url(#spAvg)" />
                    <path d="M0,16 Q20,10 40,14 T80,12 T120,15 T160,18" fill="none" stroke="#00d4ff"
                        stroke-width="1.5" />
                </svg>
            </div>
        </div>

        <!-- 24H 峰值风险指数 -->
        <div class="sub-card">
            <div class="sub-label">24H 峰值风险指数</div>
            <div class="risk-value peak">78<span class="risk-unit">/100</span></div>
            <div class="mini-spark">
                <svg width="100%" height="100%" viewBox="0 0 160 28" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="spPeak" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#ffab40" stop-opacity="0.3" />
                            <stop offset="100%" stop-color="#ffab40" stop-opacity="0" />
                        </linearGradient>
                    </defs>
                    <path d="M0,24 L0,20 Q20,18 40,22 T80,10 T120,14 T160,16 L160,24 Z" fill="url(#spPeak)" />
                    <path d="M0,20 Q20,18 40,22 T80,10 T120,14 T160,16" fill="none" stroke="#ffab40"
                        stroke-width="1.5" />
                </svg>
            </div>
        </div>

        <!-- 温度计 -->
        <div class="sub-card thermo-card">
            <div class="sub-label" style="position:absolute;top:8px;left:10px;">温度</div>
            <div class="thermo-scale">
                <div>50°</div>
                <div>40°</div>
                <div>30°</div>
                <div>20°</div>
                <div>10°</div>
            </div>
            <div class="thermo-body">
                <div class="thermo-tube">
                    <div class="thermo-liquid" style="height:62.5%;"></div>
                </div>
                <div class="thermo-bulb"></div>
            </div>
            <div class="thermo-value">35°</div>
        </div>

        <!-- 湿度 -->
        <div class="sub-card humidity-card">
            <div class="sub-label" style="align-self:flex-start;">湿度</div>
            <div class="humi-ring-wrap">
                <svg class="humi-svg" width="72" height="72" viewBox="0 0 72 72">
                    <circle class="humi-bg" cx="36" cy="36" r="30" />
                    <circle class="humi-fill" cx="36" cy="36" r="30" stroke-dasharray="188.5"
                        stroke-dashoffset="62.2" />
                </svg>
                <div class="humi-center">
                    <div class="humi-num">67</div>
                    <div class="humi-pct">%RH</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 温度计动画 (10°C~50°C范围, 当前35°C = (35-10)/(50-10) = 62.5%)
    // 湿度动画 (67% = stroke-dashoffset: 188.5 * (1-0.67) = 62.2)
    setTimeout(() => {
        document.querySelector('.thermo-liquid').style.height = '62.5%';
        document.querySelector('.humi-fill').style.strokeDashoffset = '62.2';
    }, 300);
</script>
